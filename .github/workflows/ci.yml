name: CI - UI, API e Allure

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  tests-and-allure:
    name: UI, API e Allure Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do projeto
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Limpar resultados antigos do Allure
        run: npm run allure:clean

      - name: Rodar testes de UI com Cypress
        continue-on-error: true
        uses: cypress-io/github-action@v7
        with:
          install: false
          command: npm run ui:test

      - name: Rodar testes de API com Allure
        if: always()
        run: npm run api:test:allure

      - name: Gerar Allure Report
        if: always()
        run: npm run allure:generate

      - name: Salvar allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 7

      - name: Salvar Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7

      - name: Salvar screenshots e vídeos do Cypress
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-ui-cypress
          path: |
            docs/evidencias/ui/screenshots
            docs/evidencias/ui/videos
          retention-days: 7